<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche Préparation - HerbaMedi</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; background: #fff; color: #3A3A3A; }
.header { text-align: center; padding-bottom: 15px; border-bottom: 2px solid #2F6B4F; margin-bottom: 15px; }
.header-label { color: #2F6B4F; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
.header-titre { font-size: 28px; font-weight: bold; color: #1a1a1a; }
.section { background-color: #E9F3EE; border: 1px solid #c8e0d0; border-radius: 6px; padding: 12px 16px; margin-bottom: 12px; }
.section-title { color: #2F6B4F; font-size: 13px; font-weight: bold; margin-bottom: 8px; }
.section-content { font-size: 12px; color: #3A3A3A; line-height: 1.8; }
.footer { text-align: center; font-size: 10px; color: #aaa; margin-top: 20px; border-top: 1px solid #ddd; padding-top: 10px; }
</style>
</head>
<body>
<div class="header">
<p class="header-label">FICHE DE PRÉPARATION</p>
<p class="header-titre" id="titre"></p>
</div>
<div class="section">
<p class="section-title" id="desc-titre"></p>
<p class="section-content" id="desc-texte"></p>
</div>
<div class="section">
<p class="section-title" id="mat-titre"></p>
<p class="section-content" id="mat-texte"></p>
</div>
<div class="section">
<p class="section-title" id="ing-titre"></p>
<p class="section-content" id="ing-texte"></p>
</div>
<div class="section">
<p class="section-title" id="duree-titre"></p>
<p class="section-content" id="duree-texte"></p>
</div>
<div class="footer">Fiche générée par HerbaMedi © 2025 · Usage informatif uniquement · Ne remplace pas un avis médical</div>
<script>
const params = new URLSearchParams(window.location.search);
document.getElementById('titre').innerText = params.get('titre') || '';
document.getElementById('desc-titre').innerText = params.get('desc_titre') || '';
document.getElementById('desc-texte').innerText = params.get('desc_texte') || '';
document.getElementById('mat-titre').innerText = params.get('mat_titre') || '';
document.getElementById('mat-texte').innerText = params.get('mat_texte') || '';
document.getElementById('ing-titre').innerText = params.get('ing_titre') || '';
document.getElementById('ing-texte').innerText = params.get('ing_texte') || '';
document.getElementById('duree-titre').innerText = params.get('duree_titre') || '';
document.getElementById('duree-texte').innerText = params.get('duree_texte') || '';
</script>
</body>
</html>
