<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche Préparation - HerbaMedi</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: white; color: #3A3A3A; max-width: 600px; margin: auto; }
@media print { @page { size: A4 portrait; margin: 20mm; } }
.header { background: white; text-align: center; padding: 20px; border-bottom: 2px solid #2F6B4F; margin-bottom: 15px; }
.logo-text { font-size: 22px; font-weight: bold; color: #2F6B4F; }
.header-label { font-size: 11px; letter-spacing: 2px; color: #888; text-transform: uppercase; margin: 5px 0; }
.header-titre { font-size: 24px; font-weight: bold; color: #1a1a1a; }
.container { padding: 15px; }
.section { background-color: #E9F3EE; border-radius: 8px; padding: 15px; margin-bottom: 12px; border-left: 4px solid #2F6B4F; }
.section-title { color: #2F6B4F; font-size: 13px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.section-content { font-size: 12px; color: #3A3A3A; line-height: 1.8; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.bullet { padding: 2px 0; }
.bullet::before { content: "• "; color: #2F6B4F; font-weight: bold; }
.step { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.step-num { background: #2F6B4F; color: white; border-radius: 50%; width: 22px; height: 22px; min-width: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
.step-text { font-size: 12px; line-height: 1.6; padding-top: 2px; }
.footer { text-align: center; font-size: 10px; color: #aaa; margin-top: 20px; padding: 15px; border-top: 1px solid #ddd; background: white; }
</style>
</head>
<body>
<div class="header">
<div class="logo-text">🌿 Herbamedi</div>
<p class="header-label">FICHE DE PRÉPARATION</p>
<p class="header-titre" id="titre"></p>
</div>
<div class="container">
<div class="section">
<div class="section-title">📋 <span id="desc-titre"></span></div>
<div class="section-content" id="desc-texte"></div>
</div>
<div class="two-col">
<div class="section">
<div class="section-title">🧰 <span id="mat-titre"></span></div>
<div class="section-content" id="mat-texte"></div>
</div>
<div class="section">
<div class="section-title">🌱 <span id="ing-titre"></span></div>
<div class="section-content" id="ing-texte"></div>
</div>
</div>
<div class="section">
<div class="section-title">🔧 <span id="etapes-titre"></span></div>
<div class="section-content" id="etapes-texte"></div>
</div>
<div class="section">
<div class="section-title">⏳ <span id="duree-titre"></span></div>
<div class="section-content" id="duree-texte"></div>
</div>
</div>
<div class="footer">Fiche générée par HerbaMedi © 2025 · Usage informatif uniquement · Ne remplace pas un avis médical</div>
<script>
const params = new URLSearchParams(window.location.search);
document.getElementById('titre').innerHTML = params.get('titre') || '';
document.getElementById('desc-titre').innerText = params.get('desc_titre') || '';
document.getElementById('desc-texte').innerText = params.get('desc_texte') || '';
document.getElementById('mat-titre').innerText = params.get('mat_titre') || '';
const matTexte = (params.get('mat_texte') || '').split('|');
document.getElementById('mat-texte').innerHTML = matTexte.map(t => t.trim() ? `<div class="bullet">${t}</div>` : '').join('');
document.getElementById('ing-titre').innerText = params.get('ing_titre') || '';
const ingTexte = (params.get('ing_texte') || '').split('|');
document.getElementById('ing-texte').innerHTML = ingTexte.map(t => t.trim() ? `<div class="bullet">${t}</div>` : '').join('');
document.getElementById('etapes-titre').innerText = params.get('etapes_titre') || '';
const etapesTexte = (params.get('etapes_texte') || '').split('|');
document.getElementById('etapes-texte').innerHTML = etapesTexte.map((t, i) => t.trim() ? `<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${t}</div></div>` : '').join('');
document.getElementById('duree-titre').innerText = params.get('duree_titre') || '';
document.getElementById('duree-texte').innerText = params.get('duree_texte') || '';
</script>
</body>
</html>
