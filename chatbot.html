<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HerbaMedi Chatbot</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #f5f5f0; height: 100vh; display: flex; flex-direction: column; }
.header { background: white; text-align: center; padding: 15px; border-bottom: 2px solid #2F6B4F; }
.logo-text { font-size: 20px; font-weight: bold; color: #2F6B4F; }
.header-label { font-size: 11px; color: #888; letter-spacing: 2px; }
.chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
.message { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
.message.user { background: #2F6B4F; color: white; align-self: flex-end; border-bottom-right-radius: 3px; }
.message.bot { background: white; color: #3A3A3A; align-self: flex-start; border-bottom-left-radius: 3px; border: 1px solid #E9F3EE; }
.message.loading { background: #E9F3EE; color: #888; align-self: flex-start; font-style: italic; }
.input-area { background: white; padding: 12px; border-top: 1px solid #ddd; display: flex; gap: 8px; }
.input-area input { flex: 1; padding: 10px 14px; border: 1px solid #c8e0d0; border-radius: 20px; font-size: 13px; outline: none; }
.input-area input:focus { border-color: #2F6B4F; }
.input-area button { background: #2F6B4F; color: white; border: none; border-radius: 20px; padding: 10px 18px; font-size: 13px; cursor: pointer; }
.input-area button:hover { background: #1e4d35; }
.disclaimer { text-align: center; font-size: 10px; color: #aaa; padding: 5px; background: white; }
</style>
</head>
<body>
<div class="header">
<img src="https://soniwing.github.io/Herbamedi-FichePreparation/Logo_Herbamedi_Image.png" style="height: 50px; margin-bottom: 5px;"><br>
<span class="header-label">ASSISTANT HERBAL IA</span>
</div>
<div class="chat-container" id="chat">
<div class="message bot">Bonjour ! Je suis votre assistant HerbaMedi 🌿 Posez-moi vos questions sur les plantes médicinales, préparations et remèdes naturels !</div>
</div>
<div class="input-area">
<input type="text" id="userInput" placeholder="Posez votre question..." onkeypress="if(event.key==='Enter') sendMessage()">
<button onclick="sendMessage()">Envoyer</button>
</div>
<div class="disclaimer">Les réponses sont informatives et ne remplacent pas un avis médical.</div>

<script>
const SYSTEM_PROMPT = `Tu es HerbaMedi, un assistant spécialisé dans les plantes médicinales, les préparations naturelles et les remèdes traditionnels. Tu réponds uniquement aux questions liées aux plantes, leurs propriétés, leurs utilisations médicinales, les préparations et remèdes naturels. Tu es bienveillant, pédagogique et tu rappelles que tes réponses sont informatives et ne remplacent pas un avis médical. Tu réponds dans la langue de l'utilisateur. Tes réponses sont courtes et claires.`;

const messages = [];

async function sendMessage() {
    const input = document.getElementById('userInput');
    const chat = document.getElementById('chat');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';

    const userDiv = document.createElement('div');
    userDiv.className = 'message user';
    userDiv.innerText = text;
    chat.appendChild(userDiv);

    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'message loading';
    loadingDiv.innerText = 'HerbaMedi réfléchit...';
    chat.appendChild(loadingDiv);
    chat.scrollTop = chat.scrollHeight;

    messages.push({ role: 'user', content: text });

    try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 1000,
                system: SYSTEM_PROMPT,
                messages: messages
            })
        });

        const data = await response.json();
        const reply = data.content[0].text;

        messages.push({ role: 'assistant', content: reply });

        loadingDiv.className = 'message bot';
        loadingDiv.innerText = reply;
    } catch (error) {
        loadingDiv.className = 'message bot';
        loadingDiv.innerText = 'Désolé, une erreur est survenue. Veuillez réessayer.';
    }

    chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
